<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmed | Fresh Bakes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="text-align: center; margin-top: 50px;">
        <div class="card" style="max-width: 500px; margin: auto; padding: 40px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <h1 style="color: #28a745; font-size: 3rem;">✅</h1>
            <h2 style="margin-top: 0;">Order Placed!</h2>
            <p>Your delicious treats are being prepared.</p>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            
            <h3 style="color: #d2691e;">Total to Pay: $<span id="final-amount">0.00</span></h3>
            
            <div style="text-align: left; background: #fdfaf6; padding: 20px; border-radius: 10px; border-left: 5px solid #d2691e;">
                <p><strong>Option 1: UPI</strong><br>Pay to: <code>bakery@upi</code></p>
                <p style="margin-bottom: 0;"><strong>Option 2: Cash on Delivery</strong><br>Pay when your order arrives!</p>
            </div>

            <br>
            <a href="index.html" class="add-btn" style="text-decoration: none; display: block;">Back to Menu</a>
        </div>
    </div>

    <script>
        // This script pulls the total we saved in the previous step
        const amount = localStorage.getItem("lastOrderTotal") || "0.00";
        document.getElementById('final-amount').innerText = amount;
    </script>
</body>
</html>
